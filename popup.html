<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>PR Highlighter Settings</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      width: 220px;
      padding: 12px 16px;
      margin: 0;
      color: #24292f;
    }
    h3 {
      margin: 0 0 12px;
      font-size: 13px;
      font-weight: 600;
    }
    label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      cursor: pointer;
      margin-bottom: 8px;
    }
    input[type="checkbox"] {
      width: 14px;
      height: 14px;
      cursor: pointer;
      accent-color: #2da44e;
    }
  </style>
</head>
<body>
  <h3>Highlight Settings</h3>
  <label>
    <input type="checkbox" id="highlightApproved" />
    Approved PRs
  </label>
  <label>
    <input type="checkbox" id="highlightDraft" />
    Draft PRs
  </label>
  <script src="popup.js"></script>
</body>
</html>
